<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRIS Display — Barcode Reader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a1a;
    color: #fff;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 100%);
  }
  .header {
    background: linear-gradient(90deg, #1a1a4e, #2a1a5e);
    padding: 16px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #00d4ff;
  }
  .header h1 {
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: #00d4ff;
  }
  .header .time {
    font-size: 1.4rem;
    color: #aaa;
  }
  .main-content {
    flex: 1;
    display: flex;
    padding: 15px;
    gap: 15px;
  }
  .left-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .row {
    display: flex;
    gap: 12px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 20px;
  }
  .card .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
  }
  .card .value {
    font-size: 1.6rem;
    font-weight: 700;
  }
  .card .value.nopol {
    font-size: 2.2rem;
    color: #ffcc00;
    letter-spacing: 3px;
  }
  .card .value.tarif {
    font-size: 2.4rem;
    color: #ffcc00;
  }
  .card .value.qris {
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    color: #00d4ff;
    word-break: break-all;
  }
  .photo-frame {
    width: 340px;
    min-width: 280px;
    background: #111;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.1);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .photo-frame .placeholder {
    color: #555;
    font-size: 0.9rem;
    text-align: center;
    padding: 20px;
  }
  .idle-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }
  .idle-screen h1 { font-size: 3rem; color: #00d4ff; }
  .idle-screen p { font-size: 1.2rem; color: #666; }
  .hidden { display: none !important; }
  .status-bar {
    padding: 6px 30px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #666;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
  .dot.green { background:#00ff88; }
</style>
</head>
<body>

<div id="idleScreen" class="idle-screen">
  <h1>⏳ SISTEM PARKIR</h1>
  <p>Menunggu transaksi...</p>
</div>

<div id="mainContainer" class="container hidden">
  <div class="header">
    <h1 id="outletName">SISTEM PARKIR</h1>
    <div class="time" id="currentTime">--:--:--</div>
  </div>

  <div class="main-content">
    <div class="left-panel">
      <div class="card">
        <div class="label">No. Transaksi</div>
        <div class="value" id="notrans">—</div>
      </div>
      <div class="row">
        <div class="card" style="flex:2;">
          <div class="label">Nomor Polisi</div>
          <div class="value nopol" id="nopol">—</div>
        </div>
        <div class="card" style="flex:1;">
          <div class="label">Jenis</div>
          <div class="value" id="jenisKend">—</div>
        </div>
      </div>
      <div class="row">
        <div class="card" style="flex:1;">
          <div class="label">Jam Masuk</div>
          <div class="value" id="jamMasuk">—</div>
        </div>
        <div class="card" style="flex:1;">
          <div class="label">Durasi</div>
          <div class="value" id="durasi" style="color:#00ff88;">—</div>
        </div>
        <div class="card" style="flex:1;">
          <div class="label">Tarif</div>
          <div class="value tarif" id="tarif">Rp 0</div>
        </div>
      </div>
      <div class="card" style="flex:1;">
        <div class="label">QRIS Text</div>
        <div class="value qris" id="qrisText">—</div>
      </div>
    </div>

    <div class="photo-frame" id="photoFrame">
      <img id="fotoImg" src="" alt="Foto" style="display:none;">
      <div class="placeholder" id="fotoPlaceholder">📷 Foto</div>
    </div>
  </div>

  <div class="status-bar">
    <span><span class="dot green"></span><span id="statusText">Connected</span></span>
    <span id="paidByInfo">—</span>
  </div>
</div>

<script>
(function() {
  const idleScreen  = document.getElementById('idleScreen');
  const mainCon     = document.getElementById('mainContainer');
  const outletName  = document.getElementById('outletName');
  const notrans     = document.getElementById('notrans');
  const nopol       = document.getElementById('nopol');
  const jenisKend   = document.getElementById('jenisKend');
  const jamMasuk    = document.getElementById('jamMasuk');
  const durasi      = document.getElementById('durasi');
  const tarif       = document.getElementById('tarif');
  const qrisText    = document.getElementById('qrisText');
  const fotoImg     = document.getElementById('fotoImg');
  const fotoPh      = document.getElementById('fotoPlaceholder');
  const statusText  = document.getElementById('statusText');
  const paidByInfo  = document.getElementById('paidByInfo');
  const timeEl      = document.getElementById('currentTime');

  function updateClock() {
    const now = new Date();
    timeEl.textContent = now.toLocaleTimeString('id-ID', { hour12: false });
  }
  setInterval(updateClock, 1000);
  updateClock();

  function fmtCurrency(n) {
    return 'Rp ' + Number(n || 0).toLocaleString('id-ID');
  }

  function applyState(data) {
    outletName.textContent = data.outlet || 'SISTEM PARKIR';
    if (data.status === 'idle' || (!data.notrans && data.status !== 'active')) {
      idleScreen.classList.remove('hidden');
      mainCon.classList.add('hidden');
      document.title = 'QRIS BC — Idle';
      return;
    }
    idleScreen.classList.add('hidden');
    mainCon.classList.remove('hidden');
    document.title = 'QRIS BC — ' + (data.nopol || 'Transaksi');

    notrans.textContent   = data.notrans || '—';
    nopol.textContent     = data.nopol || '—';
    jenisKend.textContent = data.jenis_kend || '—';
    jamMasuk.textContent  = data.jam_masuk || '—';
    durasi.textContent    = data.durasi || '—';
    tarif.textContent     = fmtCurrency(data.tarif);
    qrisText.textContent  = data.qris_text || '—';
    paidByInfo.textContent = data.paid_by ? ('Dibayar: ' + data.paid_by) : '—';

    if (data.foto_path) {
      fotoImg.src = '/photo/current?t=' + Date.now();
      fotoImg.style.display = 'block';
      fotoPh.style.display = 'none';
    } else {
      fotoImg.style.display = 'none';
      fotoPh.style.display = 'block';
    }
  }

  const evtSource = new EventSource('/stream');
  evtSource.onmessage = function(e) {
    try {
      applyState(JSON.parse(e.data));
      statusText.textContent = 'Connected';
    } catch (err) { console.warn(err); }
  };
  evtSource.onerror = function() {
    statusText.textContent = 'Reconnecting...';
  };

  fetch('/state').then(r => r.json()).then(applyState).catch(() => {});
})();
</script>
</body>
</html>
